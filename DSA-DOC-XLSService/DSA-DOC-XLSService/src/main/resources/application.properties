server.port=8094
server.servlet.context-path=/DSA-DOC-XLSService/rest

# File data source
## Absolute file path
#xlsx.data.source.file.path=C:\fdbo_data\crm.xlsx

## Resurce file path: inside JAR [resources] directory
xlsx.data.source.file.path=datasource/crm.xlsx

# logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.org.hibernate.SQL=info

# SpringBoot Security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.security.user.name=developer
spring.security.user.password=iis
