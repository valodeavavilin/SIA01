### REST Data HTTP service
server.port=8090
server.servlet.context-path=/DSA-SQL-PostgreSQLService/rest


### JPA / Hibernate Data Source - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver


### JDBC Custom Data Source - PostgreSQL
### Folosit de JDBCDataSourceConnector
jdbc.data.source.DB_URL=jdbc:postgresql://localhost:5432/postgres
jdbc.data.source.USER=postgres
jdbc.data.source.PASS=postgres


### Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


### Logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace


### SpringBoot Security
### Dezactiveaza login-ul automat Spring Security pentru endpointurile REST
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

spring.security.user.name=developer
spring.security.user.password=iis